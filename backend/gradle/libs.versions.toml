[versions]
spring-boot = "4.0.5"
spring-dependency-management = "1.1.7"
springdoc = "3.0.2"
flyway-postgres = "11.8.1"

[libraries]
springdoc-webmvc-ui = { module = "org.springdoc:springdoc-openapi-starter-webmvc-ui", version.ref = "springdoc" }
